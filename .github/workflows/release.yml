name: Release Application

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Update package.json version from Git Tag
        shell: bash
        run: |
          # Extrai a versão limpando o prefixo 'v' (ex: v1.0.2 -> 1.0.2)
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "Disparado para tag: $TAG_NAME"
          echo "Injetando versão no package.json: $VERSION"
          npm version $VERSION --allow-same-version --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Create GitHub Release Drafts
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_RELLEASES }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" --repo igormenin/MultiChatIntegrator-Releases --draft --title "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}" || echo "Release draft já existe (público)"
          gh release create "${{ github.ref_name }}" --draft --title "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}" || echo "Release draft já existe (privado)"

      - name: Build and Publish Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_RELLEASES }}
          MAIN_VITE_TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          MAIN_VITE_TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          MAIN_VITE_YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          MAIN_VITE_YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          MAIN_VITE_YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          MAIN_VITE_KICK_CLIENT_ID: ${{ secrets.KICK_CLIENT_ID }}
          MAIN_VITE_KICK_CLIENT_SECRET: ${{ secrets.KICK_CLIENT_SECRET }}
          MAIN_VITE_SMTP_HOST: ${{ secrets.SMTP_HOST }}
          MAIN_VITE_SMTP_PORT: ${{ secrets.SMTP_PORT }}
          MAIN_VITE_SMTP_USER: ${{ secrets.SMTP_USER }}
          MAIN_VITE_SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIN_VITE_SMTP_TO: ${{ secrets.SMTP_TO }}
        run: npm run build:win -- --publish always

      - name: Publish Releases (Mark as Latest)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_RELLEASES }}
        shell: bash
        run: |
          gh release edit "${{ github.ref_name }}" --repo igormenin/MultiChatIntegrator-Releases --draft=false --prerelease=false --latest || echo "Failed to update public release"
          gh release edit "${{ github.ref_name }}" --draft=false --prerelease=false --latest || echo "Failed to update private release"
